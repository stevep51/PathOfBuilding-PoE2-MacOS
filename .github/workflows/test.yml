name: Lua syntax check
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  lua_syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit
      - name: Syntax-check all Lua sources
        run: |
          # loadfile() compiles each file (catching syntax errors) without
          # executing it, so this is fast and avoids the heavy engine/test
          # runtime that exhausts LuaJIT's memory ceiling.
          find src -name '*.lua' > /tmp/lua_files.txt
          luajit -e 'local n=0; for f in io.lines("/tmp/lua_files.txt") do local ok,err=loadfile(f); if not ok then io.stderr:write("SYNTAX ERROR: "..err.."\n"); os.exit(1) end; n=n+1 end; print("OK: "..n.." Lua files compiled")'
